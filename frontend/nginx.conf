server {
  listen 80;
  server_name _;

  # Статическое SPA
  root /usr/share/nginx/html;
  index index.html;

  # Все запросы к API проксируем на бэкенд (контейнер "backend":8080).
  # Важно: trailing slash в proxy_pass — так отрежется префикс /api/
  location /api/ {
    proxy_pass http://backend:8080/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback — чтобы роуты фронта работали по F5
  location / {
    try_files $uri /index.html;
  }
}