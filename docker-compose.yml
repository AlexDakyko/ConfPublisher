version: "3.9"

services:
  db:
    image: postgres:16
    # container_name: confpublisher-postgres   # (опционально; лучше без фиксированного имени)
    environment:
      POSTGRES_DB: confpublisher
      POSTGRES_USER: confpublisher
      POSTGRES_PASSWORD: confpublisher
    # Порт БД наружу не обязателен — контейнеры и так общаются по внутренней сети.
    # Если хочешь подключаться к БД с хоста (psql/IDE), раскомментируй следующую строку:
    # ports:
    #   - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      # Ждём, пока Postgres будет Готов принимать подключения
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ./backend
    environment:
      # Профиль для докера (если захочешь — добавим application-docker.yml позже)
      SPRING_PROFILES_ACTIVE: docker
      # ВАЖНО: именно такие переменные понимает Spring Boot «из коробки»
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/confpublisher
      SPRING_DATASOURCE_USERNAME: confpublisher
      SPRING_DATASOURCE_PASSWORD: confpublisher
      SERVER_PORT: 8080
    ports:
      - "9090:8080"   # API доступен на http://localhost:9090
    depends_on:
      # Ждём не просто старт контейнера БД, а именно состояние "здоров" (healthy)
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      # Чтобы фронт знал адрес API
      VITE_API_BASE_URL: http://localhost:9090
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db_data: