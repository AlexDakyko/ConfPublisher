version: "3.9"

services:
  db:
    image: postgres:16
    container_name: confpublisher-postgres
    environment:
      POSTGRES_DB: confpublisher
      POSTGRES_USER: confpublisher
      POSTGRES_PASSWORD: confpublisher
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: confpublisher
      POSTGRES_USER: confpublisher
      POSTGRES_PASSWORD: confpublisher
      SERVER_PORT: 8080
    ports:
      - "9090:8080"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db_data:

