server:
  # Порт сервера берём из переменной окружения SERVER_PORT (по умолчанию 8080)
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    # Все 3 параметра придут из docker-compose (env):
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/confpublisher}
    username: ${SPRING_DATASOURCE_USERNAME:confpublisher}
    password: ${SPRING_DATASOURCE_PASSWORD:confpublisher}
  jpa:
    hibernate:
      # Для разработки: автоматически создаём/обновляем схему (чтобы не падать на пустой БД)
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        # Диалект для Postgres (можно не задавать — определяется автоматически, но оставим явно)
        dialect: org.hibernate.dialect.PostgreSQLDialect

# CORS: разрешаем фронту (Vite dev server на 5173) обращаться к API (9090)
spring:
  mvc:
    cors:
      mappings:
        "[/**]":
          allowed-origins: "http://localhost:5173"
          allowed-methods: "*"
          allowed-headers: "*"
          allow-credentials: true
          max-age: 3600

management:
  endpoints:
    web:
      exposure:
        # Открываем только health и info (минимум, что нужно)
        include: health,info
